version: '3.8'

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: shipit
      POSTGRES_USER: shipit_user
      POSTGRES_PASSWORD: shipit_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Django Backend ──
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DB_NAME=shipit
      - DB_USER=shipit_user
      - DB_PASSWORD=shipit_password
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    volumes:
      - ./backend:/app

  # ── React Frontend ──
frontend:
  build: ./frontend
  ports:
    - "5173:5173"
  environment:
    - VITE_API_BASE_URL=http://54.144.92.70:8000/api
  volumes:
    - ./frontend:/app
    - /app/node_modules
  depends_on:
    - backend

volumes:
  postgres_data: